---
apiVersion: v1
kind: Secret
metadata:
  name: hermes-feishu-secrets
  namespace: hermes
type: Opaque
stringData:
  FEISHU_APP_ID: "YOUR_FEISHU_APP_ID"
  FEISHU_APP_SECRET: "YOUR_FEISHU_APP_SECRET"
  API_SERVER_KEY: "YOUR_API_SERVER_KEY"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-feishu-config
  namespace: hermes
data:
  config.yaml: |
    model:
      default: "claude-opus-4-6"
      provider: "custom"
      base_url: "http://${LITELLM_HOST}:4000"
      api_key: "YOUR_LITELLM_API_KEY"
    terminal:
      backend: "local"
      timeout: 180
    compression:
      enabled: true
      threshold: 0.50
    approvals:
      mode: "off"
  SOUL.md: |
    You are an enterprise AI assistant connected to Feishu.
    You can execute code, analyze data, and manage files.
    Always follow security best practices.
  .env: |
    FEISHU_APP_ID=YOUR_FEISHU_APP_ID
    FEISHU_APP_SECRET=YOUR_FEISHU_APP_SECRET
    API_SERVER_KEY=YOUR_API_SERVER_KEY
    GATEWAY_ALLOW_ALL_USERS=true
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: hermes-feishu-data
  namespace: hermes
spec:
  accessModes: ["ReadWriteOnce"]
  storageClassName: ebs-sc
  resources:
    requests:
      storage: 2Gi
---
apiVersion: v1
kind: Pod
metadata:
  name: hermes-feishu-sandbox
  namespace: hermes
  labels:
    app: hermes-sandbox
    tenant: feishu-team
    platform: feishu
spec:
  runtimeClassName: kata-clh
  serviceAccountName: hermes-sandbox
  nodeSelector:
    katacontainers.io/kata-runtime: "true"
  tolerations:
    - key: kata
      operator: Equal
      value: "true"
      effect: NoSchedule
  dnsPolicy: None
  dnsConfig:
    nameservers:
      - "10.1.0.2"  # VPC DNS (VPC CIDR base + 2). Kata VMs cannot reach ClusterIP.
    searches:
      - "hermes.svc.cluster.local"
      - "svc.cluster.local"
      - "cluster.local"
    options:
      - name: ndots
        value: "5"
  containers:
    - name: hermes
      image: nousresearch/hermes-agent:latest
      command: ["sh", "-c"]
      args:
        - |
          sed "s|\${LITELLM_HOST}|${LITELLM_HOST}|g" /config-template/config.yaml > /opt/data/config.yaml
          cp /config-template/SOUL.md /opt/data/SOUL.md
          cp /config-template/.env /opt/data/.env
          exec /opt/hermes/docker/entrypoint.sh gateway run
      ports:
        - containerPort: 8642
          name: api
          protocol: TCP
        - containerPort: 9119
          name: dashboard
          protocol: TCP
      env:
        - name: HERMES_UID
          value: "10000"
        - name: HERMES_GID
          value: "10000"
        - name: HOST_IP
          valueFrom:
            fieldRef:
              fieldPath: status.hostIP
        - name: LITELLM_HOST
          valueFrom:
            configMapKeyRef:
              name: kata-network-config
              key: litellm_host
      envFrom:
        - secretRef:
            name: hermes-feishu-secrets
      volumeMounts:
        - name: data
          mountPath: /opt/data
        - name: config
          mountPath: /config-template
      resources:
        requests:
          cpu: "1"
          memory: "2Gi"
        limits:
          cpu: "4"
          memory: "8Gi"
      livenessProbe:
        exec:
          command: ["pgrep", "-f", "hermes"]
        initialDelaySeconds: 60
        periodSeconds: 30
        failureThreshold: 5
      securityContext:
        runAsUser: 0
        runAsGroup: 0
  volumes:
    - name: data
      persistentVolumeClaim:
        claimName: hermes-feishu-data
    - name: config
      configMap:
        name: hermes-feishu-config
---
apiVersion: v1
kind: Service
metadata:
  name: hermes-feishu-sandbox
  namespace: hermes
spec:
  selector:
    app: hermes-sandbox
    tenant: feishu-team
  ports:
    - name: api
      port: 8642
      targetPort: 8642
    - name: dashboard
      port: 9119
      targetPort: 9119
